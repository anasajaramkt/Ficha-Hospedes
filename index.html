<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Hóspede / Guest Registration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; padding: 20px; color: #333; }
        .container { max-width: 650px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: auto; }
        h2 { color: #0056b3; border-bottom: 3px solid #0056b3; padding-bottom: 10px; margin-top: 0; }
        .section-title { background: #f8f9fa; padding: 10px; margin-top: 25px; font-weight: bold; border-left: 4px solid #0056b3; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .flex-container { display: flex; gap: 15px; }
        .flex-item { flex: 1; }
        button { background-color: #28a745; color: white; border: none; padding: 18px; width: 100%; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .footer-text { font-size: 12px; color: #6c757d; margin-top: 25px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ficha de Hóspede <br><small style="font-size: 0.6em; color: #666;">Guest Registration Form</small></h2>
    
    <form action="https://formsubmit.co/info.riaendlesssouth@gmail.com" method="POST">
        
        <input type="hidden" name="_subject" value="Novo Registro de Hóspede!">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <div class="section-title">Dados Pessoais / Personal Details</div>

        <label>Nome Completo / Full Name:</label>
        <input type="text" name="Nome" required>

        <label>E-mail:</label>
        <input type="email" name="Email_Hospede" required>

        <div class="flex-container">
            <div class="flex-item">
                <label>Nacionalidade / Nationality:</label>
                <input type="text" name="Nacionalidade" required>
            </div>
            <div class="flex-item">
                <label>Data de Nascimento / Birth:</label>
                <input type="date" name="Data_Nascimento" required>
            </div>
        </div>

        <div class="section-title">Documento de Identificação / ID Details</div>

        <label>Nº Documento (CC ou Passaporte) / ID Number:</label>
        <input type="text" name="Documento" required>

        <div class="flex-container">
            <div class="flex-item">
                <label>País de Emissão / Country:</label>
                <input type="text" name="Pais_Emissao" required>
            </div>
            <div class="flex-item">
                <label>Validade / Expiry Date:</label>
                <input type="date" name="Validade_Doc" required>
            </div>
        </div>

        <div class="section-title">Estadia e Endereço / Stay & Address</div>

        <label>Morada de Residência / Home Address:</label>
        <textarea name="Endereco" rows="2" required></textarea>

        <div class="flex-container">
            <div class="flex-item">
                <label>Check-in:</label>
                <input type="date" name="CheckIn" required>
            </div>
            <div class="flex-item">
                <label>Check-out:</label>
                <input type="date" name="CheckOut" required>
            </div>
        </div>

        <button type="submit">Enviar Registro / Submit</button>

        <div class="footer-text">
            Conforme requisitos legais do SEF/AIMA. <br>
            <em>According to legal requirements for local accommodation.</em>
        </div>
    </form>
</div>

</body>
</html>
