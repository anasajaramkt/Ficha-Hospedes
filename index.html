<script>
    function submitForm() {
        const btn = document.getElementById('btnEnviar');
        const form = document.getElementById('form-container');
        const sucesso = document.getElementById('mensagem-sucesso');

        // LISTA DE IDS ATUALIZADA
        const ids = ['nome', 'email', 'nacionalidade', 'data_nasc', 'documento', 'pais_emissao', 'validade_doc', 'morada', 'cidade', 'cod_postal', 'pais_residencia', 'checkin', 'checkout'];
        
        for (let id of ids) {
            if (!document.getElementById(id).value) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }
        }

        btn.disabled = true;
        btn.innerText = "A enviar... / Sending...";

        const data = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            nacionalidade: document.getElementById('nacionalidade').value,
            data_nasc: document.getElementById('data_nasc').value,
            documento: document.getElementById('documento').value,
            pais_emissao: document.getElementById('pais_emissao').value,
            validade_doc: document.getElementById('validade_doc').value,
            morada: document.getElementById('morada').value,
            cidade: document.getElementById('cidade').value,
            cod_postal: document.getElementById('cod_postal').value,
            pais_residencia: document.getElementById('pais_residencia').value,
            checkin: document.getElementById('checkin').value,
            checkout: document.getElementById('checkout').value
        };

        const url = 'https://script.google.com/macros/s/AKfycbwKFELO9Et-WNlR5AwyCz7b-P7283qm5gtzZjfScuwLEaDpXjcS4q1vx3WNw5cNzwAI/exec';

        fetch(url, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            body: JSON.stringify(data)
        }).then(() => {
            form.style.display = 'none';
            sucesso.style.display = 'block';
            window.scrollTo(0,0);
        }).catch(err => {
            alert('Erro ao enviar. Verifique a sua ligação.');
            btn.disabled = false;
            btn.innerText = "Enviar Registro / Submit";
        });
    }
</script>
